<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문피스 저널 어드민</title>
    <style>
        body { font-family: sans-serif; padding: 2rem; max-width: 600px; margin: 0 auto; line-height: 1.6; }
        .card { border: 1px solid #ddd; padding: 2rem; border-radius: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 0.75rem; margin-bottom: 1rem; border: 1px solid #ccc; border-radius: 0.5rem; box-sizing: border-box; }
        button { width: 100%; padding: 1rem; background: #4a3c31; color: white; border: none; border-radius: 0.5rem; cursor: pointer; font-weight: bold; }
        button:disabled { background: #ccc; }
        #status { margin-top: 1rem; padding: 1rem; border-radius: 0.5rem; display: none; }
        .success { background: #e6fffa; color: #234e52; border: 1px solid #b2f5ea; }
        .error { background: #fff5f5; color: #c53030; border: 1px solid #feb2b2; }
    </style>
</head>
<body>
    <div class="card">
        <h2>AI 저널 자동 생성</h2>
        <p>키워드를 입력하면 Gemini AI가 SEO에 최적화된 기사를 작성하고 문피스 저널에 자동 발행합니다.</p>
        <input type="text" id="keyword" placeholder="예: 임산부 수면 자세, 환도선다 완화">
        <button id="generateBtn">저널 생성 및 발행</button>
        <div id="status"></div>
    </div>

    <script>
        const btn = document.getElementById('generateBtn');
        const input = document.getElementById('keyword');
        const status = document.getElementById('status');

        btn.onclick = async () => {
            const kw = input.value.trim();
            if (!kw) return alert('키워드를 입력하세요.');

            btn.disabled = true;
            btn.textContent = '생성 중... (약 20~30초 소요)';
            status.style.display = 'none';

            try {
                const res = await fetch('/generate-journal', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ keyword: kw })
                });

                const data = await res.json();

                if (data.success) {
                    status.className = 'success';
                    status.innerHTML = `성능 최적화 저널 발행 성공!<br><a href="${data.path}" target="_blank">기사 보기: ${data.slug}.html</a>`;
                    status.style.display = 'block';
                    input.value = '';
                } else {
                    throw new Error(data.error || '알 수 없는 오류');
                }
            } catch (e) {
                status.className = 'error';
                status.textContent = '실패: ' + e.message;
                status.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = '저널 생성 및 발행';
            }
        };
    </script>
</body>
</html>
